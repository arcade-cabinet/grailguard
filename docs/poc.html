<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grailguard - Auto Battler Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- YUKA AI ENGINE -->
    <script src="https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lancelot&display=swap');

        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Lancelot', serif; user-select: none; touch-action: none; color: #eaddcf; }
        
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background: #87CEEB; }
        
        #floating-text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; overflow: hidden; }
        
        /* Medieval HUD Aesthetics */
        .bezel-wood {
            background-image: linear-gradient(90deg, #1f140e 0%, #3e2a1d 50%, #1f140e 100%);
            border-top: 2px solid #5c4033; border-bottom: 2px solid #1a100a;
            box-shadow: 0 0 25px rgba(0,0,0,1); position: relative; z-index: 20;
        }

        .parchment-inlay {
            background-color: #eaddcf;
            background-image: radial-gradient(#d4c3b3 10%, transparent 20%), radial-gradient(#d4c3b3 10%, transparent 20%);
            background-size: 10px 10px; background-position: 0 0, 5px 5px;
            border: 3px solid #4a3b22; border-radius: 6px;
            box-shadow: inset 0 0 15px rgba(74, 59, 34, 0.4), 0 4px 6px rgba(0,0,0,0.5);
            color: #3e2723; position: relative;
        }

        .title-text { font-family: 'Cinzel', serif; }

        .btn-medieval {
            background: linear-gradient(to bottom, #4a3b22, #2a2010);
            border: 1px solid #a88a44; color: #e8d099; text-shadow: 1px 1px 2px black;
            transition: all 0.2s; cursor: pointer; font-family: 'Cinzel', serif;
        }
        .btn-medieval:hover:not(:disabled) { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); transform: translateY(-2px); }
        .btn-medieval:active:not(:disabled) { transform: translateY(1px); }
        .btn-medieval:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }

        /* Toychest Tooltip */
        .tooltip {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            width: 280px; opacity: 0; pointer-events: none; transition: opacity 0.2s, bottom 0.2s;
            margin-bottom: 10px; z-index: 50; display: flex; flex-direction: column;
        }
        .toy-item:hover .tooltip { opacity: 1; bottom: 110%; }
        
        .dragging { opacity: 0.5; transform: scale(0.9); pointer-events: none; }
        .dmg-text { position: absolute; transform: translate(-50%, -50%); font-weight: bold; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; font-family: sans-serif; }
        
        /* Build Timer Alert */
        .timer-alert { animation: pulseRed 1s infinite; color: #dc2626; }
        @keyframes pulseRed { 0% { text-shadow: 0 0 5px #dc2626; } 50% { text-shadow: 0 0 20px #dc2626; } 100% { text-shadow: 0 0 5px #dc2626; } }

        /* Overlays */
        .overlay { position: absolute; inset: 0; background: rgba(10, 8, 6, 0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(212, 175, 55, 0.2); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading" class="overlay">
        <div class="spinner mb-6"></div>
        <h1 class="text-5xl title-text text-yellow-500 shadow-black drop-shadow-lg mb-2">Grailguard</h1>
        <p class="text-xl text-gray-400">Forging the Diorama & NavMesh...</p>
    </div>

    <!-- MAIN UI LAYOUT -->
    <div id="app" class="hidden">
        
        <!-- TOP BEZEL: Informatics -->
        <header class="bezel-wood p-2 flex justify-center shrink-0 shadow-lg">
            <div class="parchment-inlay w-full max-w-6xl px-6 py-2 flex justify-between items-center">
                
                <!-- Stats -->
                <div class="flex gap-6 md:gap-10">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest text-[#5c4033]">Grail</span>
                        <span id="ui-health" class="text-2xl md:text-3xl title-text text-red-700 font-bold">20</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest text-[#5c4033]">Treasury</span>
                        <span class="text-2xl md:text-3xl title-text text-yellow-700 font-bold"><span id="ui-gold">150</span>g</span>
                    </div>
                </div>

                <!-- Phase / Timer -->
                <div class="flex flex-col items-center flex-grow text-center">
                    <span id="ui-phase-label" class="text-sm md:text-md uppercase font-bold tracking-widest text-blue-900">Build Phase</span>
                    <span id="ui-timer" class="text-3xl md:text-4xl title-text font-bold text-[#3e2723]">00:30</span>
                </div>
                
                <!-- Wave Control -->
                <div class="flex flex-col items-end gap-1">
                    <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest text-[#5c4033]">Next Wave: <span id="ui-wave" class="text-blue-800 text-lg">1</span></span>
                    <button id="btn-start-early" class="btn-medieval px-4 py-2 rounded shadow title-text text-sm md:text-md whitespace-nowrap animate-pulse">Call Wave Now (+Gold)</button>
                </div>
            </div>
        </header>

        <!-- 3D ARENA -->
        <main id="canvas-container">
            <div id="floating-text-layer"></div>
            
            <!-- Upgrade Modal -->
            <div id="upgrade-menu" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 parchment-inlay p-5 rounded-xl z-20 w-64 shadow-2xl">
                <div class="flex justify-between items-center mb-4 border-b border-[#5c4033] pb-2">
                    <h3 id="upgrade-title" class="text-lg title-text font-bold text-[#3e2723]">Building</h3>
                    <button id="btn-close-upgrade" class="text-[#5c4033] hover:text-red-700 text-2xl leading-none font-sans">&times;</button>
                </div>
                <button id="btn-sell" class="w-full bg-red-900 bg-opacity-80 border border-red-900 text-red-200 p-3 rounded font-bold text-sm hover:bg-red-800 transition title-text">
                    Scrap for <span id="sell-value" class="text-yellow-400">25</span>g
                </button>
            </div>
        </main>

        <!-- BOTTOM BEZEL: The Toychest -->
        <footer class="bezel-wood p-3 flex justify-center shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
            <div class="parchment-inlay w-full max-w-5xl px-4 py-2 flex items-center justify-center relative">
                
                <div class="absolute -top-4 bg-[#eaddcf] border-2 border-[#4a3b22] px-4 py-1 rounded-full text-[#3e2723] font-bold text-xs shadow-md z-30 title-text">
                    Drag to Arena • Barricades on Road • Spawners on Grass
                </div>

                <div class="flex gap-4 md:gap-6 overflow-x-auto py-3 px-2" id="build-menu">
                    <!-- Javascript populates Toychest here -->
                </div>
            </div>
        </footer>

    </div>

<script>
/**
 * GRAILGUARD - DIORAMA EDITION (ORTHOGRAPHIC 2.5D + YUKA AI)
 */

// --- GAME DATA DICTIONARIES ---
const ARENA_SIZE = 100;
const BUILDINGS = {
    wall:   { cost: 25, isBuilding: false, icon: '🚧', name: 'Heavy Barricade', role: 'Blocks the King\'s Road to stall enemy advances.', stats: 'HP: 600 | DPS: 0' },
    hut:    { cost: 50, isBuilding: true, spawnTime: 3.5, unit: 'militia', icon: '⚔️', name: 'Militia Hut', role: 'Spawns cheap infantry to engage enemies in melee.', stats: 'Unit: 40 HP | 10 DMG | 3.5s Spawn' },
    range:  { cost: 100, isBuilding: true, spawnTime: 4.5, unit: 'archer', icon: '🏹', name: 'Archery Range', role: 'Spawns ranged units that fire safely from behind walls.', stats: 'Unit: 20 HP | 15 DMG | 4.5s Spawn' },
    temple: { cost: 150, isBuilding: true, spawnTime: 6.0, unit: 'cleric', icon: '✨', name: 'Cleric Temple', role: 'Spawns healers that actively seek and mend damaged allies and barricades.', stats: 'Unit: 30 HP | 20 HEAL | 6.0s Spawn' },
    keep:   { cost: 200, isBuilding: true, spawnTime: 8.0, unit: 'knight', icon: '🛡️', name: 'Knight Keep', role: 'Spawns heavily armored tanks to hold the line against bosses.', stats: 'Unit: 150 HP | 25 DMG | 8.0s Spawn' }
};

const UNITS = {
    wall:    { hp: 600, speed: 0, damage: 0, range: 0, atkSpd: 99, isRanged: false, isHealer: false, color: 0x8b4513, scale: 1.2 },
    militia: { hp: 40, speed: 6.0, damage: 10, range: 2.0, atkSpd: 1.0, isRanged: false, isHealer: false, color: 0x3b82f6, scale: 0.8 },
    archer:  { hp: 20, speed: 5.0, damage: 15, range: 15.0, atkSpd: 1.5, isRanged: true, isHealer: false, color: 0x22c55e, scale: 0.75 },
    cleric:  { hp: 30, speed: 4.5, damage: -20, range: 12.0, atkSpd: 2.0, isRanged: true, isHealer: true, color: 0x14b8a6, scale: 0.8 },
    knight:  { hp: 150, speed: 4.0, damage: 25, range: 2.5, atkSpd: 1.5, isRanged: false, isHealer: false, color: 0x9ca3af, scale: 1.1 },
    goblin:  { hp: 30, speed: 7.0, damage: 5, range: 2.0, atkSpd: 0.8, isRanged: false, color: 0x4d7c0f, scale: 0.7, cost: 5, reward: 2 },
    orc:     { hp: 80, speed: 5.0, damage: 15, range: 2.5, atkSpd: 1.5, isRanged: false, color: 0x7f1d1d, scale: 1.0, cost: 12, reward: 5 },
    troll:   { hp: 250, speed: 3.5, damage: 30, range: 3.5, atkSpd: 2.0, isRanged: false, color: 0x1e1b4b, scale: 1.4, cost: 25, reward: 10 },
    boss:    { hp: 1200, speed: 2.5, damage: 50, range: 4.0, atkSpd: 3.0, isRanged: false, color: 0x2d0a28, scale: 2.2, cost: 150, reward: 50 } 
};

// --- GAME STATE ---
const STATE = {
    gold: 150,
    health: 20,
    wave: 1,
    phase: 'build', 
    buildTimeLeft: 0,
    waveQueue: [],
    spawnTimer: 0,
    buildings: [],
    projectiles: [],
    particles: [],
    floatingTexts: [],
    gameOver: false,
    drag: { active: false, type: null, element: null, valid: false, pos: new THREE.Vector3() },
    selectedBuilding: null
};

// --- THREE.JS & YUKA SETUP (DIORAMA / ORTHOGRAPHIC 2.5D) ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Bright Sky Blue

// Camera configuration for Responsive Diorama Projection
let camera;
const BASE_CAMERA_POS = new THREE.Vector3(0, 100, 70);

function initCamera() {
    const aspect = window.innerWidth / window.innerHeight;
    // We want the entire 100x100 board to fit. Diagonal is ~141. A frustum size of 120 covers it comfortably.
    let viewSize = 120;
    if (aspect < 1) viewSize = 120 / aspect; // Automatically zoom out on narrow mobile screens

    camera = new THREE.OrthographicCamera(
        -viewSize * aspect / 2, viewSize * aspect / 2,
        viewSize / 2, -viewSize / 2,
        1, 1000
    );
    camera.position.copy(BASE_CAMERA_POS);
    camera.lookAt(0, 0, 0);
}
initCamera();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Bright, vibrant lighting setup
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
scene.add(hemiLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.4)); // Global fill light

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5); // Warm sun
dirLight.position.set(30, 100, -30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.left = -60; dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60; dirLight.shadow.camera.bottom = -60;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const entityManager = new YUKA.EntityManager();
const time = new YUKA.Time();

// --- PROCEDURAL SPLINE ROAD (THE KING'S ROAD) & DIORAMA BOARD ---
let roadSpline, roadPathYuka;
const mapGroup = new THREE.Group(); scene.add(mapGroup);
let groundPlane;

function generateArena() {
    // The Diorama Base (Thick earth base)
    const baseMat = new THREE.MeshStandardMaterial({color: 0x221100, roughness: 1.0});
    const baseMesh = new THREE.Mesh(new THREE.BoxGeometry(ARENA_SIZE, 10, ARENA_SIZE), baseMat);
    baseMesh.position.y = -5.2; // Sit just underneath the terrain surface
    mapGroup.add(baseMesh);

    // The Game Board Wooden Trim / Frame
    const frameMat = new THREE.MeshStandardMaterial({color: 0x3d2817, roughness: 0.8});
    const frameThickness = 2; const frameHeight = 12;
    
    const fN = new THREE.Mesh(new THREE.BoxGeometry(ARENA_SIZE + frameThickness*2, frameHeight, frameThickness), frameMat);
    fN.position.set(0, -5, -ARENA_SIZE/2 - frameThickness/2);
    
    const fS = new THREE.Mesh(new THREE.BoxGeometry(ARENA_SIZE + frameThickness*2, frameHeight, frameThickness), frameMat);
    fS.position.set(0, -5, ARENA_SIZE/2 + frameThickness/2);
    
    const fE = new THREE.Mesh(new THREE.BoxGeometry(frameThickness, frameHeight, ARENA_SIZE), frameMat);
    fE.position.set(ARENA_SIZE/2 + frameThickness/2, -5, 0);
    
    const fW = new THREE.Mesh(new THREE.BoxGeometry(frameThickness, frameHeight, ARENA_SIZE), frameMat);
    fW.position.set(-ARENA_SIZE/2 - frameThickness/2, -5, 0);
    
    mapGroup.add(fN, fS, fE, fW);

    // 100x100 Ground - Vibrant Green Top Surface
    const groundGeo = new THREE.PlaneGeometry(ARENA_SIZE, ARENA_SIZE, 64, 64);
    const pos = groundGeo.attributes.position;
    for(let i=0; i<pos.count; i++) {
        let x = pos.getX(i), y = pos.getY(i);
        let zOffset = Math.sin(x*0.2)*Math.cos(y*0.2)*1.5 + Math.sin(x*0.05)*Math.cos(y*0.05)*3.0;
        pos.setZ(i, zOffset);
    }
    groundGeo.computeVertexNormals();
    
    groundPlane = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({color: 0x3a7332, roughness: 0.9, flatShading: true}));
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.receiveShadow = true;
    mapGroup.add(groundPlane);

    // Generate Spline Curve for Road
    const points = [
        new THREE.Vector3(-45, 0.5, 40), // Spawn
        new THREE.Vector3(-20, 0.5, 30),
        new THREE.Vector3(-10, 0.5, 0),
        new THREE.Vector3(15, 0.5, -20),
        new THREE.Vector3(20, 0.5, 10),
        new THREE.Vector3(0, 0.5, 0)      // Sanctuary
    ];
    roadSpline = new THREE.CatmullRomCurve3(points);
    
    // Create Yuka Path
    roadPathYuka = new YUKA.Path();
    const subPoints = roadSpline.getPoints(50);
    subPoints.forEach(p => roadPathYuka.add(new YUKA.Vector3(p.x, 0, p.z)));

    // Visual Road Extrusion - Lighter Dirt
    const tubeGeo = new THREE.TubeGeometry(roadSpline, 64, 2.5, 8, false);
    const tPos = tubeGeo.attributes.position;
    for(let i=0; i<tPos.count; i++) { tPos.setY(i, 0.2); }
    const roadMesh = new THREE.Mesh(tubeGeo, new THREE.MeshStandardMaterial({color: 0x8b5a2b, roughness: 1.0}));
    roadMesh.receiveShadow = true;
    mapGroup.add(roadMesh);

    // Sanctuary Mesh
    const sanctuary = new THREE.Mesh(new THREE.CylinderGeometry(4, 5, 2, 8), new THREE.MeshStandardMaterial({color: 0x888888}));
    sanctuary.position.set(0, 1, 0); sanctuary.receiveShadow = true; sanctuary.castShadow = true; mapGroup.add(sanctuary);
    const grail = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.2, 1.2), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0x886600}));
    grail.position.set(0, 3, 0); mapGroup.add(grail);
    const gl = new THREE.PointLight(0xffea00, 2, 20); gl.position.set(0,4,0); mapGroup.add(gl);

    // Spawn Portal Mesh
    const portal = new THREE.Mesh(new THREE.TorusGeometry(3, 0.5, 16, 32), new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.8}));
    portal.rotation.y = Math.PI/4; portal.position.copy(points[0]); portal.position.y = 3;
    mapGroup.add(portal);
    const pl = new THREE.PointLight(0xff0000, 3, 30); pl.position.copy(portal.position); mapGroup.add(pl);
}

// --- MATH PACING & WAVE GENERATION ---
function calculateWaveBudget(w) { return Math.floor(50 * Math.pow(1.15, w) + 2 * (w * w)); }
function calculateBuildTimer(w) { return Math.floor(30 + 10 * Math.log(w)); }

function initBuildPhase() {
    STATE.phase = 'build';
    STATE.buildTimeLeft = calculateBuildTimer(STATE.wave);
    
    let budget = calculateWaveBudget(STATE.wave);
    STATE.waveQueue = [];
    
    if (STATE.wave % 5 === 0 && budget >= UNITS.boss.cost) { STATE.waveQueue.push('boss'); budget -= UNITS.boss.cost; }
    
    const pool = ['troll', 'orc', 'goblin']; 
    while (budget >= UNITS.goblin.cost) {
        for (let type of pool) {
            if (budget >= UNITS[type].cost) { STATE.waveQueue.push(type); budget -= UNITS[type].cost; break; }
        }
    }
    updateUI();
}

function startWave() {
    if (STATE.phase === 'defend') return;
    if (STATE.buildTimeLeft > 0) addGold(Math.floor(STATE.buildTimeLeft * 2));
    STATE.phase = 'defend'; STATE.buildTimeLeft = 0; STATE.spawnTimer = 1.5; updateUI();
}

// --- YUKA AI ENTITIES ---
function syncTransform(entity, renderComponent) { renderComponent.matrix.copy(entity.worldMatrix); }

class GameUnit extends YUKA.Vehicle {
    constructor(type, team, position) {
        super();
        this.type = type; this.team = team; this.cfg = UNITS[type];
        
        let mult = team === 'enemy' ? (1.0 + STATE.wave * 0.15) : 1.0;
        this.maxHp = this.cfg.hp * mult; this.hp = this.maxHp; this.damage = this.cfg.damage * mult;
        
        this.maxSpeed = this.cfg.speed;
        this.position.copy(new YUKA.Vector3(position.x, position.y, position.z));
        this.boundingRadius = this.cfg.scale;
        
        this.cooldown = 0; this.combatTarget = null; this.timeAlive = 0;

        this.mesh = this.buildMesh(); scene.add(this.mesh);
        this.setRenderComponent(this.mesh, syncTransform);

        if (this.team === 'enemy') {
            const pathBehavior = new YUKA.FollowPathBehavior(roadPathYuka, 1.5);
            pathBehavior.active = true; this.steering.add(pathBehavior);
        } else if (this.type !== 'wall') {
            const reversePath = new YUKA.Path();
            [...roadPathYuka._waypoints].reverse().forEach(wp => reversePath.add(wp));
            const advBehavior = new YUKA.FollowPathBehavior(reversePath, 1.5);
            this.steering.add(advBehavior);
        }

        if (this.type !== 'wall') {
            const separation = new YUKA.SeparationBehavior(); separation.weight = 2.0; this.steering.add(separation);
        }
        
        entityManager.add(this);
    }

    buildMesh() {
        const group = new THREE.Group(); group.matrixAutoUpdate = false; const s = this.cfg.scale;
        if (this.type === 'wall') {
            const geo = new THREE.BoxGeometry(4, 3, 2); const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x8b5a2b, roughness: 1}));
            mesh.position.y = 1.5; mesh.castShadow = true; group.add(mesh);
        } else {
            const body = new THREE.Mesh(new THREE.BoxGeometry(1*s, 1.5*s, 1*s), new THREE.MeshStandardMaterial({color: this.cfg.color}));
            body.position.y = 0.75*s; body.castShadow = true; group.add(body);
        }

        const hbGroup = new THREE.Group(); hbGroup.position.y = this.type === 'wall' ? 4.0 : 2.0 * s;
        const bg = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.2), new THREE.MeshBasicMaterial({color: 0x000, depthTest: false}));
        this.hpBar = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.1), new THREE.MeshBasicMaterial({color: this.team==='ally'?0x00ff00:0xff0000, depthTest: false}));
        this.hpBar.position.z = 0.01; hbGroup.add(bg); hbGroup.add(this.hpBar);
        hbGroup.renderOrder = 999; this.hpBarGroup = hbGroup; group.add(hbGroup);
        return group;
    }

    update(dt) {
        if (this.hp <= 0) return;
        super.update(dt);
        this.timeAlive += dt; this.cooldown -= dt;
        
        // Orthographic billboard fixing (look straight at camera angle)
        this.hpBarGroup.quaternion.copy(camera.quaternion).multiply(this.mesh.quaternion.clone().invert());

        if (this.type === 'wall') return;

        if(this.getSpeedSquared() > 0.1) this.mesh.children[0].position.y = (0.75*this.cfg.scale) + Math.abs(Math.sin(this.timeAlive * 15)) * 0.3;

        this.evaluateTarget();

        if (this.combatTarget) {
            let dist = this.position.distanceTo(this.combatTarget.position);
            if (dist <= this.cfg.range) {
                this.velocity.set(0,0,0); 
                let lookVec = new YUKA.Vector3().subVectors(this.combatTarget.position, this.position);
                lookVec.y = 0; lookVec.normalize(); this.rotation.lookAt(this.forward, lookVec, this.up);
                if (this.cooldown <= 0) { this.executeAttack(); this.cooldown = this.cfg.atkSpd; }
            } else {
                this.steering.behaviors[0].active = false;
                let seekForce = new YUKA.Vector3().subVectors(this.combatTarget.position, this.position).normalize().multiplyScalar(this.maxSpeed);
                this.velocity.lerp(seekForce, 0.1); 
            }
        } else {
            this.steering.behaviors[0].active = true;
            if (this.team === 'enemy') {
                if (this.position.distanceTo(new YUKA.Vector3(0,0,0)) < 5) {
                    takeDamage(this.type === 'boss' ? 5 : 1);
                    this.die(false);
                }
            }
        }
    }

    evaluateTarget() {
        if (this.combatTarget && this.combatTarget.hp > 0) { if (this.position.distanceTo(this.combatTarget.position) < this.cfg.range + 5) return; }
        let bestTarget = null;
        
        if (this.cfg.isHealer) {
            let lowestPct = 1.0;
            entityManager.entities.forEach(e => {
                if (e instanceof GameUnit && e.team === 'ally' && e.hp > 0 && e !== this) {
                    if (this.position.distanceTo(e.position) <= this.cfg.range) {
                        let pct = e.hp / e.maxHp; if (pct < lowestPct) { lowestPct = pct; bestTarget = e; }
                    }
                }
            });
        } else {
            let closestDist = Infinity; let vRange = this.cfg.isRanged ? 20 : 6;
            entityManager.entities.forEach(e => {
                if (e instanceof GameUnit && e.team !== this.team && e.hp > 0) {
                    let d = this.position.distanceTo(e.position);
                    if (this.team === 'enemy' && e.type === 'wall' && d < 4) { bestTarget = e; return; }
                    if (d < closestDist && d <= vRange) { closestDist = d; bestTarget = e; }
                }
            });
        }
        this.combatTarget = bestTarget;
    }

    executeAttack() {
        let fwd = new THREE.Vector3(0,0,1).applyQuaternion(this.mesh.quaternion);
        this.mesh.children[0].position.add(fwd.multiplyScalar(0.5));
        setTimeout(() => { if(this.mesh) this.mesh.children[0].position.sub(fwd); }, 150);

        if (this.cfg.isRanged) {
            STATE.projectiles.push(new Projectile(this, this.combatTarget, this.cfg.isHealer));
        } else {
            if (this.type === 'boss') {
                createParticles(this.mesh.position, 0xff5500, 20);
                cameraShake(); // Boss attack shakes screen
                entityManager.entities.forEach(e => { if (e instanceof GameUnit && e.team === 'ally' && this.position.distanceTo(e.position) < 6) e.takeDamage(this.damage); });
            } else {
                this.combatTarget.takeDamage(this.damage);
                createParticles(this.combatTarget.mesh.position, 0xffffff, 5);
            }
        }
    }

    takeDamage(amt) {
        if (amt < 0) {
            this.hp = Math.min(this.maxHp, this.hp - amt); this.hpBar.scale.x = Math.max(0, this.hp / this.maxHp);
            spawnFloatingText(this.mesh.position, Math.round(-amt), 'heal'); createParticles(this.mesh.position, 0x00ff00, 10); return;
        }
        this.hp -= amt; this.hpBar.scale.x = Math.max(0, this.hp / this.maxHp);
        spawnFloatingText(this.mesh.position, Math.round(amt), this.team === 'ally' ? 'dmg-ally' : 'dmg-enemy', amt > this.maxHp * 0.3);
        
        let mat = this.mesh.children[0].material, oldC = mat.color.getHex(); mat.color.setHex(0xffffff);
        setTimeout(() => { if(this.hp>0 && mat) mat.color.setHex(oldC); }, 100);
        
        if (this.hp <= 0) this.die(true);
    }

    die(killed) {
        if (killed && this.team === 'enemy' && this.cfg.reward) { addGold(this.cfg.reward); spawnFloatingText(this.mesh.position, this.cfg.reward, 'gold'); }
        createParticles(this.mesh.position, this.team==='ally'?0x8b4513:0x7f1d1d, this.type==='boss'?50:20);
        scene.remove(this.mesh); entityManager.remove(this);
    }
}

class Projectile {
    constructor(shooter, target, isHeal) {
        this.t = target; this.dmg = shooter.damage; this.isHeal = isHeal; this.active = true;
        this.mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), isHeal ? new THREE.MeshBasicMaterial({color: 0x00ffaa}) : new THREE.MeshStandardMaterial({color: 0xcccccc}));
        this.mesh.position.copy(shooter.mesh.position); this.mesh.position.y += 1; this.mesh.rotation.x = Math.PI/2; scene.add(this.mesh);
    }
    update(dt) {
        if(!this.active) return;
        if(!this.t || this.t.hp <= 0 || (this.isHeal && this.t.hp >= this.t.maxHp)) { this.active=false; scene.remove(this.mesh); return; }
        
        let tp = this.t.mesh.position.clone(); tp.y += 1;
        let dir = new THREE.Vector3().subVectors(tp, this.mesh.position);
        if (dir.length() < 1.0) {
            this.t.takeDamage(this.dmg); if(!this.isHeal) createParticles(this.mesh.position, 0xffaaaa, 5);
            this.active = false; scene.remove(this.mesh);
        } else { this.mesh.position.add(dir.normalize().multiplyScalar(40 * dt)); this.mesh.lookAt(tp); }
    }
}

class Building {
    constructor(type, pos) {
        this.type = type; this.cfg = BUILDINGS[type];
        this.levelSpawn = 1; this.levelStats = 1; this.timer = 0;
        
        const group = new THREE.Group(); group.position.copy(pos);
        let base = new THREE.Mesh(new THREE.BoxGeometry(4, 2.5, 4), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
        base.position.y = 1.25; base.castShadow = true; group.add(base);
        
        if(type==='hut') { let r=new THREE.Mesh(new THREE.ConeGeometry(3.5, 2, 4), new THREE.MeshStandardMaterial({color: 0x8b4513})); r.position.y=3; r.rotation.y=Math.PI/4; group.add(r); }
        else if(type==='temple') { let c=new THREE.Mesh(new THREE.OctahedronGeometry(1), new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x008888})); c.position.y=4; group.add(c); }
        
        this.mesh = group; this.mesh.userData = { isBuilding: true, ref: this }; scene.add(this.mesh);
    }
    update(dt) {
        if(STATE.phase !== 'defend') return;
        this.timer -= dt;
        if(this.timer <= 0) {
            let u = new GameUnit(this.cfg.unit, 'ally', this.mesh.position);
            this.timer = this.cfg.spawnTime * Math.pow(0.8, this.levelSpawn-1);
            createParticles(this.mesh.position, 0xaaaaaa, 10);
        }
    }
}

// --- PARTICLES & FLOATING TEXT ---
function createParticles(pos, color, count) {
    const mat = new THREE.MeshBasicMaterial({color: color});
    for(let i=0; i<count; i++) {
        let p = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), mat); p.position.copy(pos);
        STATE.particles.push({mesh: p, vel: new THREE.Vector3((Math.random()-0.5)*15, Math.random()*15+5, (Math.random()-0.5)*15), life: 1}); scene.add(p);
    }
}
function spawnFloatingText(pos, text, type, crit) {
    const el = document.createElement('div'); el.className = 'dmg-text';
    el.style.color = type==='dmg-ally'?'#ef4444':type==='dmg-enemy'?'#fde047':type==='heal'?'#4ade80':'#ffd700';
    el.innerText = (type==='heal'||type==='gold'?'+':'') + text + (type==='gold'?'g':'');
    el.style.fontSize = crit ? '2rem' : '1.2rem';
    document.getElementById('floating-text-layer').appendChild(el);
    STATE.floatingTexts.push({ el: el, pos: new THREE.Vector3(pos.x, pos.y+3, pos.z), life: 1, vel: new THREE.Vector3(0, 5, 0) });
}

// --- DRAG & DROP UI ---
function populateToychest() {
    const menu = document.getElementById('build-menu'); menu.innerHTML = '';
    Object.keys(BUILDINGS).forEach(key => {
        let b = BUILDINGS[key];
        let div = document.createElement('div');
        div.className = `toy-item btn-medieval rounded-xl p-2 w-20 md:w-24 flex flex-col items-center select-none relative bg-opacity-90`;
        
        let tooltip = document.createElement('div');
        tooltip.className = 'tooltip parchment-inlay p-3 text-left shadow-2xl border-2 border-[#5c4033]';
        tooltip.innerHTML = `
            <div class="font-bold text-lg title-text border-b border-[#a88a44] pb-1 mb-2 text-[#5c4033]">${b.icon} ${b.name}</div>
            <div class="text-xs mb-2 leading-tight">${b.role}</div>
            <div class="text-[10px] font-mono bg-[#3e2723] text-[#eaddcf] p-1 rounded">${b.stats}</div>
        `;
        div.appendChild(tooltip);

        let dragHandle = document.createElement('div');
        dragHandle.className = 'w-full h-full flex flex-col items-center pointer-events-none';
        dragHandle.innerHTML = `
            <div class="text-2xl mb-1">${b.icon}</div>
            <span class="text-[10px] md:text-xs font-bold text-[#e8d099] title-text">${b.name.split(' ')[0]}</span>
            <span class="text-xs text-yellow-400 font-bold">${b.cost}g</span>
        `;
        div.appendChild(dragHandle);

        div.onmousedown = (e) => startDrag(e, key, div);
        div.ontouchstart = (e) => startDrag(e, key, div);
        menu.appendChild(div);
    });
}

const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
const ghostMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 2.5, 4), new THREE.MeshBasicMaterial({color: 0x00ff00, transparent: true, opacity: 0.5}));
scene.add(ghostMesh); ghostMesh.visible = false;

function startDrag(e, type, el) {
    if (STATE.gold < BUILDINGS[type].cost || STATE.phase !== 'build') return;
    if(e.type === 'touchstart') e.preventDefault();
    STATE.drag.active = true; STATE.drag.type = type; STATE.drag.element = el;
    el.classList.add('dragging'); ghostMesh.visible = true;
}

document.getElementById('canvas-container').addEventListener('mousemove', (e) => {
    if(!STATE.drag.active) return;
    let rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1; mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    // Intersect against the conceptual top of the ground base (Y=0)
    let inter = raycaster.intersectObject(groundPlane);
    if(inter.length > 0) {
        let p = inter[0].point;
        p.x = Math.round(p.x / 5) * 5; p.z = Math.round(p.z / 5) * 5; p.y = 1.25;
        ghostMesh.position.copy(p);
        
        let closestDist = Infinity;
        roadSpline.getPoints(50).forEach(rp => {
            let d = new THREE.Vector2(p.x, p.z).distanceTo(new THREE.Vector2(rp.x, rp.z));
            if(d < closestDist) closestDist = d;
        });

        let isWall = STATE.drag.type === 'wall';
        // Road is radius 2.5. Walls within 3 units. Buildings outside 4 units.
        STATE.drag.valid = isWall ? closestDist <= 3 : closestDist >= 5;
        // Keep within arena bounds
        if(Math.abs(p.x) > ARENA_SIZE/2 - 2 || Math.abs(p.z) > ARENA_SIZE/2 - 2) STATE.drag.valid = false;

        ghostMesh.material.color.setHex(STATE.drag.valid ? 0x00ff00 : 0xff0000);
        STATE.drag.pos.copy(p);
    }
});

window.addEventListener('mouseup', () => {
    if(STATE.drag.active) {
        STATE.drag.element.classList.remove('dragging'); ghostMesh.visible = false;
        if(STATE.drag.valid) {
            addGold(-BUILDINGS[STATE.drag.type].cost);
            let pos = STATE.drag.pos.clone();
            if(STATE.drag.type === 'wall') { new GameUnit('wall', 'ally', pos); }
            else { STATE.buildings.push(new Building(STATE.drag.type, pos)); }
            createParticles(pos, 0xaaaaaa, 20); 
            cameraShake(); // Provide heavy feedback on placement
        }
        STATE.drag.active = false;
    }
});

// Click to Sell
document.getElementById('canvas-container').addEventListener('click', (e) => {
    if (STATE.drag.active || STATE.phase !== 'build') return;
    let rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1; mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    let inter = raycaster.intersectObjects(scene.children, true), cb = null;
    for (let i=0; i<inter.length; i++) { let p = inter[i].object; while(p) { if (p.userData && p.userData.isBuilding) { cb = p.userData.ref; break; } p = p.parent; } if (cb) break; }
    
    if (cb) {
        STATE.selectedBuilding = cb;
        document.getElementById('sell-value').innerText = Math.floor(BUILDINGS[cb.type].cost * 0.5);
        document.getElementById('upgrade-menu').classList.remove('hidden');
    } else {
        document.getElementById('upgrade-menu').classList.add('hidden');
    }
});

document.getElementById('btn-close-upgrade').addEventListener('click', () => { document.getElementById('upgrade-menu').classList.add('hidden'); });
document.getElementById('btn-sell').addEventListener('click', () => { 
    if(STATE.selectedBuilding) {
        addGold(Math.floor(BUILDINGS[STATE.selectedBuilding.type].cost * 0.5));
        scene.remove(STATE.selectedBuilding.mesh);
        STATE.buildings = STATE.buildings.filter(b => b !== STATE.selectedBuilding);
        createParticles(STATE.selectedBuilding.mesh.position, 0x555555, 30);
        document.getElementById('upgrade-menu').classList.add('hidden');
    }
});


// --- CORE LOOP & GAME LOGIC ---
function updateUI() {
    document.getElementById('ui-gold').innerText = STATE.gold;
    document.getElementById('ui-health').innerText = STATE.health;
    document.getElementById('ui-wave').innerText = STATE.wave;
    
    let btnEarly = document.getElementById('btn-start-early');
    let phaseLabel = document.getElementById('ui-phase-label');
    let timerLabel = document.getElementById('ui-timer');
    
    if (STATE.phase === 'build') {
        phaseLabel.innerText = "Build Phase"; phaseLabel.style.color = "#1e3a8a"; 
        btnEarly.style.display = 'block';
        let m = Math.floor(STATE.buildTimeLeft / 60); let s = Math.floor(STATE.buildTimeLeft % 60);
        timerLabel.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (STATE.buildTimeLeft <= 5) timerLabel.classList.add('timer-alert'); else timerLabel.classList.remove('timer-alert');
    } else {
        phaseLabel.innerText = "Battle Phase"; phaseLabel.style.color = "#b91c1c"; 
        timerLabel.innerText = "DEFEND!"; timerLabel.classList.remove('timer-alert'); btnEarly.style.display = 'none';
    }

    document.querySelectorAll('.toy-item').forEach(el => {
        let cost = parseInt(el.innerText.match(/(\d+)g/)[1]);
        if (STATE.gold >= cost && STATE.phase === 'build') el.classList.remove('opacity-50', 'grayscale');
        else el.classList.add('opacity-50', 'grayscale');
    });
}

function addGold(amt) { STATE.gold += amt; updateUI(); }

function cameraShake() {
    // Offset camera instantly
    camera.position.x += (Math.random()-0.5)*10;
    camera.position.y += (Math.random()-0.5)*10;
}

function takeDamage(amt) {
    STATE.health -= amt; updateUI();
    cameraShake();
    if(STATE.health <= 0) { STATE.gameOver = true; document.getElementById('game-over').classList.remove('hidden'); document.getElementById('final-wave').innerText = STATE.wave; }
}

document.getElementById('btn-start-early').addEventListener('click', startWave);

function animate() {
    requestAnimationFrame(animate);
    if(STATE.gameOver) return;

    const dt = time.update().getDelta();
    
    // Auto-spring camera back to resting position seamlessly (Replaces OrbitControls)
    camera.position.lerp(BASE_CAMERA_POS, 0.1);

    if (STATE.phase === 'build') {
        STATE.buildTimeLeft -= dt;
        if (STATE.buildTimeLeft <= 0) startWave();
        else updateUI(); 
    } else {
        STATE.spawnTimer -= dt;
        if (STATE.spawnTimer <= 0 && STATE.waveQueue.length > 0) {
            new GameUnit(STATE.waveQueue.shift(), 'enemy', roadSpline.getPoint(0));
            STATE.spawnTimer = 1.0; 
        }
        
        let enemiesAlive = false;
        entityManager.entities.forEach(e => { if (e instanceof GameUnit && e.team === 'enemy') enemiesAlive = true; });
        
        if (STATE.waveQueue.length === 0 && !enemiesAlive) {
            addGold(50 + STATE.wave * 10);
            STATE.wave++;
            initBuildPhase();
        }
    }

    entityManager.update(dt);
    STATE.buildings.forEach(b => b.update(dt));
    for(let i=STATE.projectiles.length-1; i>=0; i--) STATE.projectiles[i].update(dt);
    
    // Particles
    for(let i=STATE.particles.length-1; i>=0; i--) {
        let p = STATE.particles[i]; p.life -= dt;
        if(p.life<=0){ scene.remove(p.mesh); STATE.particles.splice(i,1); }
        else { p.vel.y -= 30*dt; p.mesh.position.add(p.vel.clone().multiplyScalar(dt)); p.mesh.scale.setScalar(p.life); }
    }
    
    // Floating Text
    for(let i=STATE.floatingTexts.length-1; i>=0; i--) {
        let f = STATE.floatingTexts[i]; f.life -= dt;
        if(f.life<=0){ f.el.remove(); STATE.floatingTexts.splice(i,1); continue; }
        f.pos.add(f.vel.clone().multiplyScalar(dt));
        let v = f.pos.clone().project(camera);
        // Ensure text renders behind UI by constraining it within canvas element bounds
        if(v.z < 1) {
            let container = document.getElementById('canvas-container');
            f.el.style.left = `${(v.x*0.5+0.5)*container.clientWidth}px`; 
            f.el.style.top = `${(v.y*-0.5+0.5)*container.clientHeight}px`;
            f.el.style.opacity = f.life;
        } else f.el.style.opacity = 0;
    }

    renderer.render(scene, camera);
}

// --- RESPONSIVE RESIZE FOR ORTHOGRAPHIC DIORAMA ---
function resizeCanvas() {
    const container = document.getElementById('canvas-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    const aspect = width / height;

    // Guaranteed framing to hold the entire 100x100 board
    let viewSize = 120;
    if (aspect < 1) viewSize = 120 / aspect; // Scale to fit width on vertical screens

    camera.left = -viewSize * aspect / 2;
    camera.right = viewSize * aspect / 2;
    camera.top = viewSize / 2;
    camera.bottom = -viewSize / 2;
    camera.updateProjectionMatrix();

    renderer.setSize(width, height);
}
window.addEventListener('resize', resizeCanvas);

window.onload = () => {
    resizeCanvas(); // Initial fit
    generateArena();
    populateToychest();
    initBuildPhase();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    animate();
};

</script>
